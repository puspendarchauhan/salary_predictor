<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salary Predictor</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      min-height:100vh;
      background:linear-gradient(135deg,#07142b,#1b2746,#2f2d73);
      display:flex;
      justify-content:center;
      align-items:center;
      padding:30px;
      color:white;
    }

    .container{
      width:100%;
      max-width:1200px;
      display:grid;
      grid-template-columns:1.3fr 0.8fr;
      gap:30px;
    }

    .card{
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.08);
      backdrop-filter:blur(18px);
      border-radius:30px;
      padding:34px;
      box-shadow:0 20px 45px rgba(0,0,0,0.35);
    }

    h1{
      font-size:3rem;
      font-weight:700;
      margin-bottom:14px;
      background:linear-gradient(90deg,#ffffff,#b794f4,#60a5fa);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .desc{
      color:#cbd5e1;
      font-size:1rem;
      margin-bottom:28px;
    }

    .form-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }

    .full{
      grid-column:1 / -1;
    }

    label{
      display:block;
      margin-bottom:8px;
      color:#dbeafe;
      font-size:0.95rem;
      font-weight:500;
    }

    input,select{
      width:100%;
      padding:15px 16px;
      border:none;
      outline:none;
      border-radius:16px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.08);
      color:white;
      font-size:0.95rem;
      transition:0.3s;
    }

    input::placeholder{
      color:#94a3b8;
    }

    input:focus,select:focus{
      border-color:#8b5cf6;
      box-shadow:0 0 0 4px rgba(139,92,246,0.18);
    }

    select option{
      background:#1e293b;
      color:white;
    }

    .btn{
      width:100%;
      margin-top:24px;
      padding:16px;
      border:none;
      border-radius:18px;
      font-size:1rem;
      font-weight:600;
      color:white;
      cursor:pointer;
      background:linear-gradient(90deg,#7c3aed,#06b6d4);
      transition:0.3s;
    }

    .btn:hover{
      transform:translateY(-2px);
      box-shadow:0 10px 30px rgba(124,58,237,0.35);
    }

    #error{
      display:none;
      margin-top:14px;
      color:#f87171;
      font-size:0.95rem;
    }

    .result-card{
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
    }

    .tag{
      padding:10px 18px;
      border-radius:999px;
      background:rgba(34,197,94,0.12);
      color:#4ade80;
      font-size:0.95rem;
      margin-bottom:24px;
    }

    .result-title{
      font-size:2rem;
      font-weight:600;
      margin-bottom:12px;
    }

    .salary{
      font-size:4rem;
      font-weight:700;
      background:linear-gradient(90deg,#34d399,#67e8f9);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      margin-bottom:10px;
    }

    .subtext{
      color:#cbd5e1;
      margin-bottom:30px;
    }

    .stats{
      width:100%;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }

    .box{
      background:rgba(255,255,255,0.06);
      border-radius:18px;
      padding:18px;
    }

    .box span{
      display:block;
      color:#94a3b8;
      font-size:0.9rem;
      margin-bottom:8px;
    }

    .box strong{
      color:white;
      font-size:1.1rem;
      font-weight:600;
    }

    @media(max-width:950px){
      .container{
        grid-template-columns:1fr;
      }

      .form-grid{
        grid-template-columns:1fr;
      }

      .full{
        grid-column:auto;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="card">
      <h1>Salary Prediction AI</h1>
      <p class="desc">Fill your details and get your estimated annual salary in Indian Rupees.</p>

      <div class="form-grid">

        <div class="full">
          <label>Full Name</label>
          <input type="text" id="name" placeholder="Prince Kumar">
        </div>

        <div>
          <label>Job Role</label>
          <select id="job_role">
            <option>Software Engineer</option>
            <option>Data Scientist</option>
            <option>Machine Learning Engineer</option>
            <option>Business Analyst</option>
            <option>DevOps Engineer</option>
          </select>
        </div>

        <div>
          <label>Experience (Years)</label>
          <input type="number" id="experience" min="0" placeholder="5">
        </div>

        <div>
          <label>Education</label>
          <select id="education">
            <option>Bachelor's Degree</option>
            <option>Master's Degree</option>
            <option>MBA</option>
            <option>PhD / Doctorate</option>
          </select>
        </div>

        <div>
          <label>Industry</label>
          <select id="industry">
            <option>Technology</option>
            <option>Finance & Banking</option>
            <option>Healthcare</option>
            <option>Consulting</option>
          </select>
        </div>

        <div>
          <label>Company Size</label>
          <select id="company_size">
            <option>Startup (1–50)</option>
            <option>Small (51–200)</option>
            <option>Mid-size (201–1000)</option>
            <option>Large (1001–5000)</option>
            <option>Enterprise (5000+)</option>
          </select>
        </div>

        <div>
          <label>City</label>
          <input type="text" id="city" placeholder="Ghaziabad">
        </div>

        <div class="full">
          <label>Skills</label>
          <input type="text" id="skills" placeholder="Python, SQL, AWS">
        </div>

      </div>

      <button class="btn" onclick="predictSalary()">Predict Salary</button>
      <div id="error"></div>
    </div>

    <div class="card result-card">
      <div class="tag">Prediction Result</div>

      <div class="result-title" id="resultName">Enter details</div>

      <div class="salary" id="salary">₹0</div>
      <div class="subtext">Estimated Annual Salary</div>

      <div class="stats">
        <div class="box">
          <span>Monthly Salary</span>
          <strong id="monthly">₹0</strong>
        </div>

        <div class="box">
          <span>Experience</span>
          <strong id="expShow">0 Years</strong>
        </div>

        <div class="box">
          <span>Salary Range</span>
          <strong id="range">₹0 - ₹0</strong>
        </div>

        <div class="box">
          <span>Model Accuracy</span>
          <strong id="accuracy">0%</strong>
        </div>

        <div class="box">
          <span>R² Score</span>
          <strong id="r2">0</strong>
        </div>

        <div class="box">
          <span>MAE</span>
          <strong id="mae">₹0</strong>
        </div>
      </div>
    </div>

  </div>

  <script>
    function formatINR(num){
      return '₹' + Number(num).toLocaleString('en-IN', {
        maximumFractionDigits: 0
      });
    }

    async function predictSalary(){
      const errorBox = document.getElementById('error');
      errorBox.style.display = 'none';

      const data = {
        name: document.getElementById('name').value.trim(),
        job_role: document.getElementById('job_role').value,
        experience: document.getElementById('experience').value,
        education: document.getElementById('education').value,
        industry: document.getElementById('industry').value,
        company_size: document.getElementById('company_size').value,
        city: document.getElementById('city').value.trim(),
        skills: document.getElementById('skills').value.trim()
      };

      if(
        !data.name ||
        !data.experience ||
        !data.city ||
        !data.skills
      ){
        errorBox.innerText = 'Please fill all required fields.';
        errorBox.style.display = 'block';
        return;
      }

      try{
        const response = await fetch('/predict', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(data)
        });

        const result = await response.json();

        if(!response.ok){
          throw new Error(result.message || 'Prediction failed');
        }

        document.getElementById('resultName').innerText =
          `${data.name} · ${data.job_role}`;

        document.getElementById('salary').innerText =
          formatINR(result.predicted_salary);

        document.getElementById('monthly').innerText =
          formatINR(result.monthly_salary);

        document.getElementById('expShow').innerText =
          `${data.experience} Years`;

        document.getElementById('range').innerText =
          `${formatINR(result.min_salary)} - ${formatINR(result.max_salary)}`;

        document.getElementById('accuracy').innerText =
          `${result.accuracy}%`;

        document.getElementById('r2').innerText =
          result.r2;

        document.getElementById('mae').innerText =
          formatINR(result.mae);

      }catch(err){
        errorBox.innerText = err.message;
        errorBox.style.display = 'block';
      }
    }
  </script>

</body>
</html>
